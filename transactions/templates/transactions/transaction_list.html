<a href="{% url 'transaction_list' %}">Головна</a>
<a href="{% url 'category_list' %}">Категорії</a>
<a href="{% url 'budget_dashboard' %}">Бюджетний звіт</a>
<a href="/admin/">Адмін-панель</a>

<h2>Керування транзакціями</h2>

<form method="get" style="margin-bottom: 20px;">
    <input type="text" name="q" placeholder="Пошук за описом..." value="{{ request.GET.q }}">

    <select name="category">
        <option value="">Усі категорії</option>
        {% for cat in categories %}
            <option value="{{ cat.id }}" {% if request.GET.category == cat.id|slugify %}selected{% endif %}>
                {{ cat.name }}
            </option>
        {% endfor %}
    </select>

    <button type="submit">Застосувати</button>
    <a href="{% url 'transaction_list' %}">Скинути</a>
</form>

<table border="1" cellpadding="10">
    <thead>
        <tr>
            <th>
                <a href="?sort=desc&q={{ request.GET.q }}&category={{ request.GET.category }}">Опис ↑</a> /
                <a href="?sort=-desc&q={{ request.GET.q }}&category={{ request.GET.category }}">↓</a>
            </th>
            <th>
                <a href="?sort=amount&q={{ request.GET.q }}&category={{ request.GET.category }}">Сума ↑</a> /
                <a href="?sort=-amount&q={{ request.GET.q }}&category={{ request.GET.category }}">↓</a>
            </th>
            <th>Категорія</th>
            <th>Тип</th>
        </tr>
    </thead>
    <tbody>
        {% for t in transactions %}
        <tr>
            <td>{{ t.desc }}</td>
            <td>{{ t.amount }}</td>
            <td>{{ t.category.name }}</td>
            <td>{{ t.get_transaction_type_display }}</td>
        </tr>
        {% empty %}
        <tr><td colspan="4">Нічого не знайдено.</td></tr>
        {% endfor %}
    </tbody>
</table>
